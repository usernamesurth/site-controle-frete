<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>🚛 Gamarano's Frete</title>

  <!-- ÍCONE ABA -->
  <link rel="icon"
        type="image/png"
        href="logo.png">

  <!-- CSS -->
  <link rel="stylesheet"
        href="style.css">

  <!-- ÍCONES -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">

    <h2>

      <i class="fa-solid fa-truck"></i>

      Controle de Frete

    </h2>

    <br>

    <input type="email"
           id="user"
           placeholder="Email">

    <br><br>

    <input type="password"
           id="pass"
           placeholder="Senha">

    <!-- BOTÃO LOGIN -->
    <button class="loginBtn"
            onclick="login()">

      <i class="fa-solid fa-right-to-bracket"></i>

      Entrar

    </button>

  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <!-- TOPO -->
    <div class="topo">

      <div class="logoArea">

        <i class="fa-solid fa-truck-fast"></i>

        <div>

          <h1>

            MEU <span>CAMINHÃO</span>

          </h1>

          <p>Controle de Ganhos</p>

        </div>

      </div>

      <!-- SAIR -->
      <button onclick="logout()"
              class="logout">

        <i class="fa-solid fa-right-from-bracket"></i>

        Sair

      </button>

    </div>

    <!-- CARDS -->
    <div class="cards">

      <!-- LUCRO -->
      <div class="card verde">

        <i class="fa-solid fa-wallet"></i>

        <h3>LUCRO TOTAL</h3>

        <h2>

          R$
          <span id="lucroEl">0</span>

        </h2>

        <p>Total líquido</p>

      </div>

      <!-- FRETE -->
      <div class="card azul">

        <i class="fa-solid fa-arrow-trend-up"></i>

        <h3>TOTAL FRETE</h3>

        <h2>

          R$
          <span id="totalFreteEl">0</span>

        </h2>

        <p>Valor bruto</p>

      </div>

      <!-- GASTOS -->
      <div class="card roxo">

        <i class="fa-solid fa-gas-pump"></i>

        <h3>TOTAL GASTO</h3>

        <h2>

          R$
          <span id="totalGastoEl">0</span>

        </h2>

        <p>Despesas totais</p>

      </div>

    </div>

    <!-- NOVA VIAGEM -->
    <div class="box">

      <h2>

        <i class="fa-solid fa-circle-plus"></i>

        ADICIONAR VIAGEM

      </h2>

      <div class="formGrid">

        <!-- DATA -->
        <div class="inputGroup">

          <label>

            <i class="fa-solid fa-calendar-days"></i>

            DATA DA VIAGEM

          </label>

          <input type="date"
                 id="data"
                 readonly>

        </div>

        <!-- PLACA -->
        <div class="inputGroup">

          <label>

            <i class="fa-solid fa-truck"></i>

            PLACA DO CAMINHÃO

          </label>

          <input type="text"
                 id="placa"
                 placeholder="Ex: ABC-1234">

        </div>

        <!-- CIDADE -->
        <div class="inputGroup"
             style="grid-column:1/3;">

          <label>

            <i class="fa-solid fa-location-dot"></i>

            CIDADE / ROTA

          </label>

          <select id="cidade">

            <option value="">
              Selecione a cidade - MG
            </option>

            <option>Belo Horizonte - MG</option>
            <option>Uberlândia - MG</option>
            <option>Contagem - MG</option>
            <option>Juiz de Fora - MG</option>
            <option>Betim - MG</option>
            <option>Montes Claros - MG</option>
            <option>Uberaba - MG</option>
            <option>Governador Valadares - MG</option>
            <option>Ipatinga - MG</option>
            <option>Sete Lagoas - MG</option>
            <option>Divinópolis - MG</option>
            <option>Poços de Caldas - MG</option>
            <option>Pouso Alegre - MG</option>
            <option>Patos de Minas - MG</option>
            <option>Barbacena - MG</option>
            <option>Ouro Preto - MG</option>
            <option>Mariana - MG</option>
            <option>Conselheiro Lafaiete - MG</option>
            <option>Lavras - MG</option>
            <option>Varginha - MG</option>

          </select>

        </div>

        <!-- FRETE -->
        <div class="inputGroup">

          <label>

            <i class="fa-solid fa-money-bill-wave"></i>

            VALOR DO FRETE

          </label>

          <div class="inputBox">

            <span>R$</span>

            <input type="number"
                   id="frete"
                   placeholder="0,00">

          </div>

        </div>

        <!-- COMBUSTÍVEL -->
        <div class="inputGroup">

          <label>

            <i class="fa-solid fa-gas-pump"></i>

            COMBUSTÍVEL

          </label>

          <div class="inputBox">

            <span>R$</span>

            <input type="number"
                   id="gasto"
                   placeholder="0,00">

          </div>

        </div>

      </div>

      <!-- BOTÃO -->
      <button onclick="salvar()"
              class="salvar">

        <i class="fa-solid fa-circle-plus"></i>

        SALVAR VIAGEM

      </button>

    </div>

    <!-- HISTÓRICO -->
    <div class="box">

      <h2>

        <i class="fa-solid fa-clock-rotate-left"></i>

        VIAGENS SALVAS

      </h2>

      <ul id="lista"></ul>

    </div>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- APP -->
<script src="app.js"></script>

</body>
</html>
