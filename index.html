<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>🚛 Gamarano's Frete</title>

  <!-- ÍCONE DA ABA -->
  <link rel="icon"
        type="image/png"
        href="logo.png">

  <!-- CSS -->
  <link rel="stylesheet"
        href="style.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">

    <h2>
      <i class="fa-solid fa-truck"></i>
      Controle de Frete
    </h2>

    <input type="email"
           id="user"
           placeholder="Email">

    <input type="password"
           id="pass"
           placeholder="Senha">

    <<button onclick="login()" class="loginBtn">

  <i class="fa-solid fa-right-to-bracket"></i>

  Entrar

</button>

  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <h2>

      <i class="fa-solid fa-chart-line"></i>

      Dashboard

    </h2>

    <!-- CARDS -->
    <div class="cards">

      <div class="card">

        <i class="fa-solid fa-money-bill-trend-up"></i>

        <h3>Frete</h3>

        <p>
          R$
          <span id="totalFreteEl">0</span>
        </p>

      </div>

      <div class="card">

        <i class="fa-solid fa-gas-pump"></i>

        <h3>Gastos</h3>

        <p>
          R$
          <span id="totalGastoEl">0</span>
        </p>

      </div>

      <div class="card destaque">

        <i class="fa-solid fa-sack-dollar"></i>

        <h3>Lucro</h3>

        <p>
          R$
          <span id="lucroEl">0</span>
        </p>

      </div>

      <div class="card destaque">

        <i class="fa-solid fa-hand-holding-dollar"></i>

        <h3>Seu 50%</h3>

        <p>
          R$
          <span id="metadeEl">0</span>
        </p>

      </div>

    </div>

    <!-- NOVA VIAGEM -->
    <div class="card">

      <h3>

        <i class="fa-solid fa-road"></i>

        Nova Viagem

      </h3>

      <!-- FRETE -->
      <label>

        <i class="fa-solid fa-money-bill-wave"></i>

        Valor do Frete

      </label>

      <div class="inputBox">

        <span>R$</span>

        <input type="number"
               id="frete"
               placeholder="0,00">

      </div>

      <!-- COMBUSTÍVEL -->
      <label>

        <i class="fa-solid fa-gas-pump"></i>

        Combustível

      </label>

      <div class="inputBox">

        <span>R$</span>

        <input type="number"
               id="gasto"
               placeholder="0,00">

      </div>

      <!-- DATA -->
      <label>

        <i class="fa-solid fa-calendar-days"></i>

        Data

      </label>

      <input type="date"
             id="data"
             readonly>

      <!-- CIDADE -->
      <label>

        <i class="fa-solid fa-location-dot"></i>

        Cidade

      </label>

      <input list="cidadesMG"
             id="cidade"
             placeholder="Cidade">

      <datalist id="cidadesMG">

        <option value="Belo Horizonte - MG">
        <option value="Uberlândia - MG">
        <option value="Contagem - MG">
        <option value="Juiz de Fora - MG">
        <option value="Betim - MG">
        <option value="Montes Claros - MG">
        <option value="Uberaba - MG">
        <option value="Governador Valadares - MG">
        <option value="Ipatinga - MG">
        <option value="Sete Lagoas - MG">
        <option value="Divinópolis - MG">
        <option value="Poços de Caldas - MG">
        <option value="Pouso Alegre - MG">
        <option value="Patos de Minas - MG">
        <option value="Barbacena - MG">
        <option value="Ouro Preto - MG">
        <option value="Mariana - MG">
        <option value="Conselheiro Lafaiete - MG">
        <option value="Lavras - MG">
        <option value="Varginha - MG">

      </datalist>

      <!-- BOTÃO -->
      <button onclick="salvar()">

        <i class="fa-solid fa-floppy-disk"></i>

        Salvar Viagem

      </button>

    </div>

    <!-- HISTÓRICO -->
    <div class="card">

      <h3>

        <i class="fa-solid fa-clock-rotate-left"></i>

        Histórico

      </h3>

      <ul id="lista"></ul>

    </div>

    <!-- SAIR -->
    <button onclick="logout()" class="logout">

      <i class="fa-solid fa-right-from-bracket"></i>

      Sair

    </button>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</body>
</html>
