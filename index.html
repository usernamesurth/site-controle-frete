<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>🚛 Gamarano's Frete</title>

  <!-- ÍCONE -->
  <link rel="icon" type="image/png" href="logo.png">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">

    <h2>
      <i class="fa-solid fa-truck"></i>
      Controle de Frete
    </h2>

    <input type="email" id="user" placeholder="Email">

    <input type="password" id="pass" placeholder="Senha">

    <button type="button"
            class="loginBtn"
            onclick="login()">

      <i class="fa-solid fa-right-to-bracket"></i>
      Entrar

    </button>

  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <!-- TOPO -->
    <div class="topo">

      <div class="logoArea">

        <i class="fa-solid fa-truck-fast"></i>

        <div>
          <h1>MEU <span>CAMINHÃO</span></h1>
          <p>Controle de Ganhos</p>
        </div>

      </div>

      <!-- SAIR -->
      <button onclick="logout()" class="logout">

        <i class="fa-solid fa-right-from-bracket"></i>
        Sair

      </button>

    </div>

    <!-- HISTÓRICO -->
    <div class="box">

      <h2>
        <i class="fa-solid fa-clock-rotate-left"></i>
        VIAGENS SALVAS
      </h2>

      <ul id="lista">

        <!-- EXEMPLO -->
        <li>

          <span>
            Belo Horizonte - MG
          </span>

          <div class="acoes">

            <button class="editar">
              Editar
            </button>

            <button class="excluir"
                    onclick="abrirModalExcluir('123')">

              Excluir

            </button>

          </div>

        </li>

      </ul>

    </div>

  </div>

</div>

<!-- MODAL SUCESSO -->
<div id="modal" class="modal">

  <div class="modal-content">

    <h2>✅ Sucesso</h2>

    <p>Viagem salva com sucesso!</p>

    <button onclick="fecharModal()">OK</button>

  </div>

</div>

<!-- MODAL EXCLUIR -->
<div class="modal-overlay" id="modalExcluir">

  <div class="modal-delete">

    <div class="icon">🗑️</div>

    <h2>Excluir</h2>

    <p>Deseja realmente excluir esta viagem?</p>

    <div class="modal-buttons">

      <button class="btn-delete"
              onclick="confirmarExclusao()">

        Excluir

      </button>

      <button class="btn-cancel"
              onclick="fecharModalExcluir()">

        Cancelar

      </button>

    </div>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

let viagemId = null;

/* ABRIR MODAL */
function abrirModalExcluir(id) {

  viagemId = id;

  document.getElementById("modalExcluir").style.display = "flex";
}

/* FECHAR MODAL */
function fecharModalExcluir() {

  document.getElementById("modalExcluir").style.display = "none";
}

/* CONFIRMAR EXCLUSÃO */
function confirmarExclusao() {

  // REMOVE ITEM DA TELA
  const item = document.querySelector(`[data-id="${viagemId}"]`);

  if(item){
    item.remove();
  }

  alert("Viagem excluída com sucesso!");

  fecharModalExcluir();
}

</script>

</body>
</html>
